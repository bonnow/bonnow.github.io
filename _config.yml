title: "Bon's Notes"
tagline: "ServiceNow architecture, scripts, and troubleshooting notes"
description: "ServiceNow architecture, scripts, and troubleshooting notes"

lang: en-US
timezone: Australia/Perth

url: "https://bonnow.github.io"   # 여기는 본인 주소로 변경
baseurl: ""

# theme: minima
theme: jekyll-theme-chirpy

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-archives

github:
  username: bonnow   # 본인 GitHub username으로 변경

avatar: "https://github.com/bonnow.png"

social:
  name: Bon
  email: ""
  links:
    - https://github.com/bonnow
    - https://www.linkedin.com/in/bonseung-g-9a604318a/
    - https://www.youtube.com/channel/UCcWVP8-zbvaIGy-4EMhElww

paginate: 10

collections:
  tabs:
    output: true
    sort_by: order


jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
